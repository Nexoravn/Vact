<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nghe Truyện Audio</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1f2937;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --green: #1DB954;
  --green-dark: #17a349;
  --green-glow: rgba(29,185,84,0.18);
  --green-dim: rgba(29,185,84,0.08);
  --text: #e6edf3;
  --text2: #8b949e;
  --text3: #484f58;
  --amber: #f0a500;
  --amber-bg: rgba(240,165,0,0.1);
  --amber-border: rgba(240,165,0,0.3);
  --red: #f85149;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Be Vietnam Pro', sans-serif;
  font-size: 14px;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 24px 16px 48px;
}
.app { width: 100%; max-width: 520px; }

.logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
.logo-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--green); display: flex; align-items: center; justify-content: center;
}
.logo-icon svg { width: 20px; height: 20px; }
.logo-text { font-size: 16px; font-weight: 600; color: var(--text); }
.logo-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }

.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 12px;
}

label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 7px; }
.input-row { display: flex; gap: 8px; }
input[type=text] {
  flex: 1; padding: 10px 14px;
  background: var(--bg); border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--text); font-size: 14px;
  font-family: inherit; outline: none; transition: border-color .2s, box-shadow .2s;
}
input[type=text]:focus { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-glow); }
input[type=text]::placeholder { color: var(--text3); }
.go-btn {
  padding: 10px 20px; border: none; border-radius: var(--radius-sm);
  background: var(--green); color: #000; font-size: 14px; font-weight: 600;
  font-family: inherit; cursor: pointer; white-space: nowrap; transition: background .15s, transform .1s;
}
.go-btn:hover { background: #1ed760; }
.go-btn:active { transform: scale(.97); }
.go-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

.hint { font-size: 11px; color: var(--text3); margin-top: 7px; line-height: 1.6; }
.err { font-size: 12px; color: var(--red); margin-top: 7px; min-height: 14px; }

.scan-row {
  display: none; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text2); margin-top: 8px;
}
.mini-spin {
  width: 13px; height: 13px; border-radius: 50%;
  border: 2px solid var(--border2); border-top-color: var(--green);
  animation: spin .7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.resume-card {
  display: none; background: var(--amber-bg);
  border: 0.5px solid var(--amber-border);
  border-radius: var(--radius); padding: 14px 20px; margin-bottom: 12px;
}
.resume-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.resume-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }
.resume-title { font-size: 12px; font-weight: 600; color: var(--amber); }
.resume-info { font-size: 13px; color: var(--text); margin-bottom: 12px; line-height: 1.5; }
.resume-btns { display: flex; gap: 8px; }
.btn-resume {
  padding: 8px 18px; border: none; border-radius: var(--radius-sm);
  background: var(--amber); color: #000; font-size: 13px; font-weight: 600;
  font-family: inherit; cursor: pointer; transition: opacity .15s;
}
.btn-resume:hover { opacity: .85; }
.btn-dismiss {
  padding: 8px 14px; border: 0.5px solid var(--amber-border);
  border-radius: var(--radius-sm); background: transparent;
  color: var(--amber); font-size: 13px; font-family: inherit; cursor: pointer; transition: background .15s;
}
.btn-dismiss:hover { background: var(--amber-bg); }

.player-card {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.empty {
  padding: 48px 20px; text-align: center;
}
.empty-icon {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--green-dim); display: flex; align-items: center; justify-content: center;
  margin: 0 auto 14px;
}
.empty-text { font-size: 13px; color: var(--text2); line-height: 1.7; }

.banner {
  background: linear-gradient(135deg, #0a3d21 0%, #0d2b1a 100%);
  border-bottom: 0.5px solid var(--border);
  padding: 20px;
  display: flex; gap: 16px; align-items: center;
  position: relative; overflow: hidden;
}
.banner::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 80% 50%, rgba(29,185,84,.12) 0%, transparent 70%);
}
.cover {
  width: 68px; height: 68px; border-radius: 10px;
  background: var(--green); display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 600; color: #000;
  flex-shrink: 0; position: relative; z-index: 1;
  box-shadow: 0 4px 20px rgba(29,185,84,.35);
}
.banner-info { flex: 1; min-width: 0; position: relative; z-index: 1; }
.b-title {
  font-size: 16px; font-weight: 600; color: #fff;
  line-height: 1.3; margin-bottom: 4px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.b-sub { font-size: 12px; color: rgba(255,255,255,.5); margin-bottom: 8px; }
.badges { display: flex; gap: 5px; flex-wrap: wrap; }
.badge {
  font-size: 10px; padding: 2px 9px; border-radius: 999px;
  border: 0.5px solid rgba(29,185,84,.4);
  background: rgba(29,185,84,.12); color: #6fcf97; font-weight: 500;
}
.badge-gray {
  border-color: var(--border2); background: rgba(255,255,255,.06); color: var(--text2);
}

.player-body { padding: 20px; }

.ep-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 16px; }
.ep-big { font-size: 26px; font-weight: 600; color: var(--text); }
.ep-of { font-size: 13px; color: var(--text2); }

audio { display: none; }

.progress-area { margin-bottom: 6px; }
input[type=range].prog {
  width: 100%; cursor: pointer;
  -webkit-appearance: none; appearance: none;
  height: 4px; border-radius: 4px;
  background: var(--surface2);
  outline: none; transition: height .15s;
}
input[type=range].prog:hover { height: 5px; }
input[type=range].prog::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: var(--green); cursor: pointer;
  box-shadow: 0 0 0 3px var(--green-glow); transition: transform .15s;
}
input[type=range].prog:hover::-webkit-slider-thumb { transform: scale(1.2); }
input[type=range].prog::-moz-range-thumb {
  width: 14px; height: 14px; border-radius: 50%; background: var(--green);
  border: none; cursor: pointer;
}
.time-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 18px; }

.toast {
  display: none; align-items: center; gap: 8px;
  background: var(--green-dim); border: 0.5px solid rgba(29,185,84,.2);
  border-radius: var(--radius-sm); padding: 8px 12px;
  font-size: 12px; color: #6fcf97; margin-bottom: 14px;
}
.toast-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pulse 1s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

.controls {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; margin-bottom: 20px;
}
.ctrl-btn {
  border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
  background: transparent; color: var(--text); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, border-color .12s;
  font-family: inherit; font-weight: 500;
}
.ctrl-btn:hover { background: var(--surface2); border-color: var(--border2); }
.ctrl-btn:disabled { opacity: .25; cursor: not-allowed; }
.ctrl-skip { width: 42px; height: 42px; font-size: 11px; flex-direction: column; gap: 1px; }
.ctrl-skip span:first-child { font-size: 15px; line-height: 1; }
.ctrl-ep { width: 42px; height: 42px; }
.ctrl-ep svg { width: 20px; height: 20px; }
.ctrl-play {
  width: 58px; height: 58px; border-radius: 50%;
  background: var(--green); border-color: var(--green);
  color: #000; margin: 0 4px;
}
.ctrl-play:hover { background: #1ed760; border-color: #1ed760; }
.ctrl-play svg { width: 24px; height: 24px; }

.divider { border: none; border-top: 0.5px solid var(--border); margin: 0 0 14px; }

.ep-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.ep-section-label { font-size: 12px; color: var(--text2); font-weight: 500; }
.more-btn {
  font-size: 11px; padding: 4px 12px; border: 0.5px solid var(--border2);
  border-radius: 999px; background: transparent; color: var(--text2);
  font-family: inherit; cursor: pointer; transition: background .12s, color .12s;
}
.more-btn:hover { background: var(--surface2); color: var(--text); }

.ep-grid {
  display: flex; flex-wrap: wrap; gap: 5px;
  max-height: 160px; overflow-y: auto; padding-right: 2px; margin-bottom: 16px;
}
.ep-grid::-webkit-scrollbar { width: 3px; }
.ep-grid::-webkit-scrollbar-track { background: transparent; }
.ep-grid::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.ep-btn {
  width: 54px; padding: 6px 0; text-align: center;
  border: 0.5px solid var(--border); border-radius: var(--radius-sm);
  background: transparent; color: var(--text2); font-size: 12px;
  font-family: inherit; cursor: pointer; transition: all .12s;
}
.ep-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }
.ep-btn.past { color: var(--text3); border-color: transparent; background: rgba(255,255,255,.03); }
.ep-btn.active {
  background: var(--green); color: #000; border-color: var(--green);
  font-weight: 600; box-shadow: 0 2px 12px var(--green-glow);
}

.url-row {
  display: flex; gap: 8px; align-items: center;
  padding-top: 14px; border-top: 0.5px solid var(--border);
}
.url-txt {
  flex: 1; font-size: 10px; color: var(--text3);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-family: monospace; cursor: pointer; padding: 4px 0;
}
.url-txt:hover { color: var(--text2); }
.cp-btn {
  font-size: 11px; padding: 5px 12px; border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); background: transparent; color: var(--text2);
  font-family: inherit; cursor: pointer; white-space: nowrap; transition: all .12s;
}
.cp-btn:hover { background: var(--surface2); color: var(--text); }
.cp-btn.copied { color: var(--green); border-color: rgba(29,185,84,.4); }
</style>
</head>
<body>
<div class="app">

  <div class="logo-row">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M9 18V5l12-2v13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="6" cy="18" r="3" fill="white"/>
        <circle cx="18" cy="16" r="3" fill="white"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">Nghe Truyện Audio</div>
      <div class="logo-sub">audiotruyenfull.com / .org</div>
    </div>
  </div>

  <div class="card">
    <label>Dán link trang truyện</label>
    <div class="input-row">
      <input type="text" id="urlIn" placeholder="https://audiotruyenfull.com/ten-truyen/"
        onkeydown="if(event.key==='Enter')onLoad()"/>
      <button class="go-btn" id="goBtn" onclick="onLoad()">Tải truyện</button>
    </div>
    <div class="scan-row" id="scanRow">
      <div class="mini-spin"></div>
      <span id="scanTxt">Đang dò số tập...</span>
    </div>
    <div class="err" id="errLine"></div>
    <div class="hint">Tự nhận số tập · Lưu tiến độ nghe · Tự chuyển tập tiếp theo</div>
  </div>

  <div class="resume-card" id="resumeCard">
    <div class="resume-header">
      <div class="resume-dot"></div>
      <div class="resume-title">Tiếp tục nghe</div>
    </div>
    <div class="resume-info" id="resumeInfo">—</div>
    <div class="resume-btns">
      <button class="btn-resume" onclick="doResume()">▶ Nghe tiếp</button>
      <button class="btn-dismiss" onclick="dismissResume()">Bỏ qua</button>
    </div>
  </div>

  <div class="player-card">
    <div id="emptyState" class="empty">
      <div class="empty-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
          <path d="M9 18V5l12-2v13" stroke="#1DB954" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="6" cy="18" r="3" fill="#1DB954"/>
          <circle cx="18" cy="16" r="3" fill="#1DB954"/>
        </svg>
      </div>
      <div class="empty-text">Dán link truyện bên trên<br/>rồi nhấn <strong>Tải truyện</strong> để bắt đầu</div>
    </div>

    <div id="storyView" style="display:none">
      <div class="banner">
        <div class="cover" id="cover">TT</div>
        <div class="banner-info">
          <div class="b-title" id="bTitle">—</div>
          <div class="b-sub" id="bSub"></div>
          <div class="badges" id="bBadges"></div>
        </div>
      </div>

      <div class="player-body">
        <div class="ep-row">
          <div class="ep-big" id="epBig">Tập 1</div>
          <div class="ep-of" id="epOf">/ —</div>
        </div>

        <audio id="ap" preload="auto"></audio>

        <div class="progress-area">
          <input type="range" class="prog" id="pb" min="0" value="0" step="1"
            oninput="onSeek()" onmousedown="isDragging=true"
            onmouseup="endSeek()" ontouchstart="isDragging=true" ontouchend="endSeek()"/>
        </div>
        <div class="time-row">
          <span id="tCur">0:00</span>
          <span id="tDur">0:00</span>
        </div>

        <div class="toast" id="toast">
          <div class="toast-dot"></div>
          <span id="toastTxt"></span>
        </div>

        <div class="controls">
          <button class="ctrl-btn ctrl-ep" id="prevBtn" onclick="changeEp(-1)" disabled title="Tập trước">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
          </button>
          <button class="ctrl-btn ctrl-skip" onclick="skip(-15)" title="-15 giây">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12.5 3C8.36 3 4.91 5.55 3.5 9.17L6 10c1-2.75 3.63-4.72 6.75-4.72 4 0 7.25 3.26 7.25 7.25S16.75 19.78 12.75 19.78c-3.5 0-6.43-2.29-7.39-5.45l-2.32.79C4.45 19.27 8.28 22 12.75 22 18.12 22 22.5 17.62 22.5 12.25S18.12 2.5 12.5 3z"/><text x="8.5" y="16" font-size="7" font-weight="600" font-family="sans-serif" fill="currentColor" text-anchor="middle">15</text></svg>
            <span>-15s</span>
          </button>
          <button class="ctrl-btn ctrl-play" id="playBtn" onclick="togglePlay()">
            <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button class="ctrl-btn ctrl-skip" onclick="skip(30)" title="+30 giây">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M11.5 3C5.88 3 1.5 7.38 1.5 12.5S5.88 22 11.5 22c4.47 0 8.3-2.73 9.82-6.66l-2.32-.79c-1.1 3.16-4.1 5.45-7.5 5.45-4.14 0-7.5-3.36-7.5-7.5s3.36-7.5 7.5-7.5c3.12 0 5.75 1.97 6.86 4.72L16 11l5.5 1.5L20.5 7l-2.38 1.32C16.59 5.55 14.14 3 11.5 3z"/><text x="14.5" y="16" font-size="7" font-weight="600" font-family="sans-serif" fill="currentColor" text-anchor="middle">30</text></svg>
            <span>+30s</span>
          </button>
          <button class="ctrl-btn ctrl-ep" id="nextBtn" onclick="changeEp(1)" disabled title="Tập sau">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 4V8l-5.5 4zM16 6v12h2V6h-2z"/></svg>
          </button>
        </div>

        <hr class="divider"/>

        <div class="ep-section-header">
          <div class="ep-section-label" id="epLabel">Danh sách tập</div>
          <button class="more-btn" onclick="scanMore()">+ Tìm tập mới</button>
        </div>
        <div class="ep-grid" id="epGrid"></div>

        <div class="url-row">
          <div class="url-txt" id="urlTxt" onclick="copyUrl()" title="Nhấn để sao chép"></div>
          <button class="cp-btn" id="cpBtn" onclick="copyUrl()">Sao chép</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
let cur=1, total=0, archId='', stTitle='', isDragging=false, toastTimer=null, resumeData=null;
const ap = document.getElementById('ap');
const pb = document.getElementById('pb');

/* ── Audio events ── */
ap.addEventListener('loadedmetadata', () => {
  pb.max = Math.floor(ap.duration);
  document.getElementById('tDur').textContent = fmt(ap.duration);
  updatePbStyle();
});
ap.addEventListener('timeupdate', () => {
  if (!isDragging) {
    pb.value = Math.floor(ap.currentTime);
    document.getElementById('tCur').textContent = fmt(ap.currentTime);
    updatePbStyle();
    if (Math.floor(ap.currentTime) % 15 === 0 && ap.currentTime > 1) saveProgress();
  }
});
ap.addEventListener('play', () => setIcon(true));
ap.addEventListener('pause', () => setIcon(false));
ap.addEventListener('ended', onEnded);

function fmt(s) {
  s = Math.floor(s || 0);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

function updatePbStyle() {
  const pct = pb.max > 0 ? (pb.value / pb.max) * 100 : 0;
  pb.style.background = `linear-gradient(to right, #1DB954 ${pct}%, #1f2937 ${pct}%)`;
}

function setIcon(playing) {
  document.getElementById('playIcon').style.display = playing ? 'none' : 'block';
  document.getElementById('pauseIcon').style.display = playing ? 'block' : 'none';
}

function onSeek() {
  document.getElementById('tCur').textContent = fmt(pb.value);
  updatePbStyle();
}
function endSeek() {
  isDragging = false;
  ap.currentTime = parseInt(pb.value);
  if (ap.paused) ap.play().catch(() => {});
}
function skip(s) {
  ap.currentTime = Math.max(0, Math.min(ap.currentTime + s, ap.duration || 0));
  pb.value = Math.floor(ap.currentTime);
  onSeek();
}
function togglePlay() {
  if (ap.paused) ap.play().catch(() => {}); else ap.pause();
}
function onEnded() {
  saveProgress();
  if (cur < total) {
    showToast('Tự chuyển sang Tập ' + (cur + 1) + '...', true);
    toastTimer = setTimeout(() => { hideToast(); changeEp(1); }, 2500);
  } else {
    showToast('Đã nghe hết ' + total + ' tập!', false);
    setTimeout(hideToast, 4000);
  }
}

/* ── LocalStorage ── */
function storageKey() { return 'prog_' + archId; }
function saveProgress() {
  if (!archId) return;
  try {
    localStorage.setItem(storageKey(), JSON.stringify({
      ep: cur, time: Math.floor(ap.currentTime),
      title: stTitle, total, savedAt: Date.now()
    }));
  } catch(e) {}
}
function loadProgress(aid) {
  try { const v = localStorage.getItem('prog_' + aid); return v ? JSON.parse(v) : null; }
  catch { return null; }
}

function showResume(data) {
  resumeData = data;
  const m = Math.floor(data.time / 60), s = data.time % 60;
  document.getElementById('resumeInfo').textContent =
    `"${data.title}" · Tập ${data.ep} tại ${m}:${String(s).padStart(2,'0')}`;
  document.getElementById('resumeCard').style.display = 'block';
}
function dismissResume() {
  document.getElementById('resumeCard').style.display = 'none';
  resumeData = null;
}
function doResume() {
  if (!resumeData) return;
  const ep = resumeData.ep, t = resumeData.time;
  dismissResume();
  playEp(ep, t);
}

function showToast(txt, pulse) {
  const el = document.getElementById('toast');
  el.style.display = 'flex';
  document.getElementById('toastTxt').textContent = txt;
  document.querySelector('.toast-dot').style.animation = pulse ? 'pulse 1s ease infinite' : 'none';
}
function hideToast() { document.getElementById('toast').style.display = 'none'; }

/* ── Load story ── */
async function onLoad() {
  const url = document.getElementById('urlIn').value.trim();
  const err = document.getElementById('errLine');
  err.textContent = '';
  if (!url) { err.textContent = 'Vui lòng nhập link truyện'; return; }
  const m = url.match(/audiotruyenfull\.\w+\/([a-z0-9][a-z0-9-]+)\/?/i);
  if (!m) { err.textContent = 'Link không đúng định dạng audiotruyenfull.com/...'; return; }

  const slug = m[1];
  archId = slug.split('-').map(w => w ? w[0].toUpperCase() + w.slice(1) : '').join('') + 'TH';
  stTitle = slug.split('-').map(w => w ? w[0].toUpperCase() + w.slice(1) : '').join(' ');

  document.getElementById('goBtn').disabled = true;
  setScan(true, 'Đang dò số tập...');

  total = await probeTotal(archId);
  setScan(false);
  document.getElementById('goBtn').disabled = false;

  if (total === 0) { err.textContent = 'Không tìm thấy audio. Kiểm tra lại link.'; return; }

  dismissResume();
  renderStory();

  const saved = loadProgress(archId);
  if (saved && saved.ep <= total && saved.time > 5) showResume(saved);
  else playEp(1, 0);
}

async function probeTotal(aid) {
  let count = 0, off = 1;
  while (true) {
    const batch = [];
    for (let i = off; i < off + 20; i++) batch.push(checkEp(aid, i));
    const res = await Promise.all(batch);
    let last = 0;
    for (let i = 0; i < res.length; i++) if (res[i]) last = off + i;
    if (last === 0 && off === 1) break;
    if (last < off + 19) { count = last; break; }
    count = last; off += 20;
    if (off > 500) break;
  }
  return count;
}

async function checkEp(aid, ep) {
  const n = String(ep).padStart(3, '0');
  const url = `https://archive.org/download/${aid}/${n}-${aid}.mp3`;
  try {
    const r = await fetch(url, { method: 'HEAD', signal: AbortSignal.timeout(5000) });
    return r.ok || r.redirected || [301, 302, 206].includes(r.status);
  } catch { return false; }
}

async function scanMore() {
  const start = total + 1;
  setScan(true, 'Đang tìm tập mới...');
  const batch = [];
  for (let i = start; i < start + 20; i++) batch.push(checkEp(archId, i));
  const res = await Promise.all(batch);
  let added = 0;
  for (let i = 0; i < res.length; i++) {
    if (res[i]) { total++; added++; addEpBtn(total); }
    else break;
  }
  setScan(false);
  document.getElementById('epLabel').textContent = `Danh sách tập (${total})`;
  document.getElementById('epOf').textContent = `/ ${total} tập`;
  if (!added) document.getElementById('errLine').textContent = 'Chưa có tập mới.';
}

function setScan(on, txt) {
  document.getElementById('scanRow').style.display = on ? 'flex' : 'none';
  if (txt) document.getElementById('scanTxt').textContent = txt;
}

/* ── Render ── */
function renderStory() {
  const init = stTitle.split(' ').slice(0, 2).map(w => w[0] || '').join('').toUpperCase() || 'TT';
  document.getElementById('cover').textContent = init;
  document.getElementById('bTitle').textContent = stTitle;
  document.getElementById('bSub').textContent = 'Archive: ' + archId;
  document.getElementById('bBadges').innerHTML =
    `<span class="badge">${total} tập</span><span class="badge badge-gray">archive.org</span>`;
  document.getElementById('epOf').textContent = `/ ${total} tập`;
  document.getElementById('epLabel').textContent = `Danh sách tập (${total})`;
  const grid = document.getElementById('epGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= total; i++) addEpBtn(i);
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('storyView').style.display = 'block';
}

function addEpBtn(ep) {
  const b = document.createElement('button');
  b.className = 'ep-btn'; b.textContent = 'Tập ' + ep; b.id = 'eb' + ep;
  b.onclick = () => playEp(ep, 0);
  document.getElementById('epGrid').appendChild(b);
}

function buildUrl(ep) {
  return `https://archive.org/download/${archId}/${String(ep).padStart(3,'0')}-${archId}.mp3`;
}

function playEp(ep, seekTo) {
  if (ep < 1 || ep > total) return;
  if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
  hideToast();
  cur = ep;
  const url = buildUrl(ep);
  ap.src = url; ap.load();
  ap.addEventListener('loadedmetadata', function once() {
    ap.removeEventListener('loadedmetadata', once);
    if (seekTo > 0) ap.currentTime = seekTo;
    ap.play().catch(() => {});
    pb.value = seekTo || 0;
    document.getElementById('tCur').textContent = fmt(seekTo || 0);
    updatePbStyle();
  });
  document.getElementById('epBig').textContent = 'Tập ' + ep;
  document.getElementById('urlTxt').textContent = url;
  document.getElementById('prevBtn').disabled = ep <= 1;
  document.getElementById('nextBtn').disabled = ep >= total;
  pb.value = 0; pb.max = 0;
  document.getElementById('tDur').textContent = '0:00';
  updatePbStyle();
  document.querySelectorAll('.ep-btn').forEach((b, i) => {
    b.classList.remove('active', 'past');
    if (i + 1 < ep) b.classList.add('past');
  });
  const ab = document.getElementById('eb' + ep);
  if (ab) { ab.classList.add('active'); ab.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
}

function changeEp(d) { saveProgress(); playEp(cur + d, 0); }

function copyUrl() {
  const txt = document.getElementById('urlTxt').textContent;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById('cpBtn');
    btn.textContent = 'Đã chép!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Sao chép'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {});
}

window.addEventListener('beforeunload', saveProgress);
</script>
